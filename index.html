    function formatExcelDate(d){
  if(!d) return null;
  if(d instanceof Date) {
    // SheetJS가 날짜를 UTC 기준으로 파싱하므로, 오차를 없애기 위해 UTC 메서드를 사용합니다.
    const y = d.getUTCFullYear();
    const m = String(d.getUTCMonth() + 1).padStart(2, '0');
    const day = String(d.getUTCDate()).padStart(2, '0');
    return `${y}-${m}-${day}`;
  }
  const s = String(d).trim();
  if(s.length >= 10) return s.slice(0, 10);
  return null;
}

    function parseNum(val) {
      if(typeof val === 'number') return val;
      if(!val) return 0;
      const str = String(val).replace(/[^0-9.-]/g, '');
      const n = parseFloat(str);
      return isNaN(n) ? 0 : n;
    }

    const NORMALIZE_MAP = {
      "마이크론 테크놀로지": "마이크론", "팔란티어 테크": "팔란티어", "인텔 코퍼레이션": "인텔", "NVIDIA": "엔비디아",
      "S&P 500": "S&P500", "나스닥 100": "NASDAQ100", "나스닥100": "NASDAQ100",
      "EURO STOXX 50": "유로스톡스50", "EUROSTOXX50": "유로스톡스50",
      "코스피 200": "KOSPI200", "코스피200": "KOSPI200", "홍콩H지수": "HSCEI", "홍콩 H지수": "HSCEI",
      "닛케이225": "니케이225", "NIKKEI225": "니케이225", "NIKKEI 225": "니케이225"
    };

    // [개선] 요청하신 '뉴글로벌 1787' 형식의 축약 로직
    function getShortName(fullName) {
      if(!fullName) return "";
      const numMatch = fullName.match(/(?:제)?(\d+)회/);
      const num = numMatch ? numMatch[1] : "";
      const tokens = fullName.split(/\s+/).filter(t => t.trim() !== "");
      
      let brand = tokens[0].replace(/증권|투자/g, ''); // 기본값
      if (tokens.length >= 2) {
        // 두 번째 단어를 브랜드로 채택 (단, ELS/DLS가 아닐 때만)
        if (!/ELS|DLS|제?\d+회/.test(tokens[1])) {
          brand = tokens[1];
        }
      }
      return num ? `${brand} ${num}` : fullName;
    }

    function parseElsExcel(wb){
      const toJ=name=>{const s=wb.Sheets[name];return s?XLSX.utils.sheet_to_json(s,{defval:""}):[];};
      const products=toJ("Products"),underlyings=toJ("Underlyings"),schedules=toJ("Schedules");
      return products.map(p=>{
        const code=String(p.product_code);
        const assets=underlyings.filter(u=>String(u.product_code)===code);
        const assetNames=assets.map(a=>{
          const raw = String(a.asset_name).trim(); return NORMALIZE_MAP[raw] || raw;
        });
        const initialPrices={}; 
        assets.forEach(a=>{ 
          const raw = String(a.asset_name).trim(); const norm = NORMALIZE_MAP[raw] || raw;
          initialPrices[norm] = parseNum(a.initial_price); 
        });
        const sched=schedules.filter(s=>String(s.product_code)===code);
        const earlyRows=sched.filter(s=>String(s.period)!=="만기");
        const evaluationDates=earlyRows.map(s=>[formatExcelDate(s.eval_date)||" ",formatExcelDate(s.payment_date)||" "]);
        let earlyBarriers = earlyRows.map(s => parseNum(s.barrier_pct)).filter(n => n > 0);
        if(earlyBarriers.length === 0) earlyBarriers = (String(p.barriers||"")).split(/[-,]/).map(parseNum).filter(n=>n>0);
        
        // ★ [버그 수정] 주기 개월수 합산 방지 로직
        let maturityMonths = 36;
        const tm = String(p.term || "");
        const termPart = tm.split(/[\/\(]/)[0].trim(); // 슬래시나 괄호 앞부분만 분석
        const my = termPart.match(/(\d+)\s*년/);
        const mm = termPart.match(/(\d+)\s*개월/);

        if (my) {
          maturityMonths = parseInt(my[1]) * 12;
          const extraMonth = termPart.match(/년\s*(\d+)\s*개월/);
          if (extraMonth) maturityMonths += parseInt(extraMonth[1]);
        } else if (mm) {
          maturityMonths = parseInt(mm[1]);
        }

        let redemptionCycle = 6;
        const cycleMatch = tm.match(/(\d+)\s*개월\s*주기/);
        if (cycleMatch) redemptionCycle = parseInt(cycleMatch[1]);
        else if(tm.includes("4개월")) redemptionCycle=4; else if(tm.includes("3개월")) redemptionCycle=3;

        const isLizard=!!(p.special_note&&String(p.special_note).includes("리자드"));
        return{
          id:code, name:String(p.full_name||code), assets:assetNames, annualRate:parseNum(p.max_annual_yield), 
          maturityMonths, redemptionCycle, earlyBarriers, knockIn:parseNum(p.ki_level)||30, 
          issueDate:formatExcelDate(p.issue_date), maturityDate:formatExcelDate(p.maturity_date), 
          initialPrices, evaluationDates, isLizard, _underlyings:assets, _schedules:sched
        };
      });
    }

      "S&P500":"^GSPC", "NASDAQ100":"^NDX", "유로스톡스50":"^STOXX50E", "KOSPI200":"^KS200", "HSCEI":"^HSCE", "니케이225":"^N225"

    function daysUntil(s){if(!s||s.trim()==="")return 9999;return Math.ceil((new Date(s)-TODAY)/86400000);}
    function getNextEval(p){for(const[e]of(p.evaluationDates||[])){const d=daysUntil(e);if(d>=0&&d!==9999)return{date:e,days:d};}return null;}

    function RatioBar({ratio, init, cur, barrier, knockIn}){
      if(!init || init <= 0) return <div style={{fontSize:12,color:"#A32D2D",padding:"8px 0",fontWeight:500}}>⚠️ 기준가 미입력</div>;
      if(cur === null || cur === undefined) return <div style={{fontSize:12,color:"#aaa",padding:"8px 0"}}>종가 데이터 대기 중</div>;
      const MIN=0, MAX=150, pct=v=>Math.max(0,Math.min(100,(v-MIN)/(MAX-MIN)*100));
      const kiPct=pct(knockIn), barPct=pct(barrier), curPct=pct(ratio);
      const curColor=ratio<knockIn?"#DC2626":ratio<barrier?"#D97706":"#0F6E56";
      const fNum = (n) => n.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2});
      const kiPrice = fNum(init * knockIn / 100);
      const barPrice = fNum(init * barrier / 100);
      const curPrice = fNum(cur);
      const labels=[{id:"ki",pct:kiPct},{id:"bar",pct:barPct},{id:"cur",pct:curPct}].sort((a,b)=>a.pct-b.pct);
      for(let i=1;i<labels.length;i++)if(labels[i].pct-labels[i-1].pct<10)labels[i].pct=labels[i-1].pct+10;
      const lm={};labels.forEach(l=>lm[l.id]=l.pct);
      return(
        <div style={{padding:"25px 0 25px"}}>
          <div style={{position:"relative",height:8,background:"#e8e8e8",borderRadius:4}}>
            <div style={{position:"absolute",left:0,top:0,bottom:0,width:`${kiPct}%`,background:"rgba(220,38,38,0.12)",borderRadius:"4px 0 0 4px"}}/>
            <div style={{position:"absolute",left:`${kiPct}%`,top:0,bottom:0,width:`${barPct-kiPct}%`,background:"rgba(217,119,6,0.10)"}}/>
            <div style={{position:"absolute",left:`${barPct}%`,top:0,bottom:0,right:0,background:"rgba(15,110,86,0.10)",borderRadius:"0 4px 4px 0"}}/>
            <div style={{position:"absolute",left:`${kiPct}%`,top:-4,bottom:-4,width:2,background:"#DC2626",transform:"translateX(-50%)",zIndex:2}}/>
            <div style={{position:"absolute",left:`${barPct}%`,top:-4,bottom:-4,width:2,background:"#D97706",transform:"translateX(-50%)",zIndex:2}}/>
            <div style={{position:"absolute",left:`${curPct}%`,top:"50%",transform:"translate(-50%,-50%)",width:13,height:13,background:curColor,borderRadius:"50%",border:"2px solid #fff",zIndex:3,outline:`2px solid ${curColor}`}}/>
            <div style={{position:"absolute",left:`${lm.ki}%`,top:-20,transform:"translateX(-50%)",fontSize:10,color:"#DC2626",whiteSpace:"nowrap",fontWeight:500}}>${kiPrice}</div>
            <div style={{position:"absolute",left:`${lm.bar}%`,top:-20,transform:"translateX(-50%)",fontSize:10,color:"#D97706",whiteSpace:"nowrap",fontWeight:500}}>${barPrice}</div>
            <div style={{position:"absolute",left:`${lm.cur}%`,top:-20,transform:"translateX(-50%)",fontSize:10,color:curColor,whiteSpace:"nowrap",fontWeight:700}}>${curPrice}</div>
            <div style={{position:"absolute",left:`${lm.ki}%`,top:12,transform:"translateX(-50%)",fontSize:11,color:"#DC2626",whiteSpace:"nowrap",fontWeight:500}}>{knockIn}%</div>
            <div style={{position:"absolute",left:`${lm.bar}%`,top:12,transform:"translateX(-50%)",fontSize:11,color:"#D97706",whiteSpace:"nowrap",fontWeight:500}}>{barrier}%</div>
            <div style={{position:"absolute",left:`${lm.cur}%`,top:12,transform:"translateX(-50%)",fontSize:11,color:curColor,whiteSpace:"nowrap",fontWeight:700}}>{ratio.toFixed(1)}%</div>
          </div>
        </div>
      );
    }

      async function handleXlsxUpload(e){

            </>)}

            {mainTab==="dashboard"&&(<>
              <div style={{display:"flex",flexDirection:"column",gap:12,marginBottom:16,background:"#fff",padding:"12px 16px",borderRadius:8,border:"0.5px solid #e5e5e5"}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8}}><div style={{display:"flex",gap:12}}><div style={{display:"flex",border:"1px solid #ddd",borderRadius:6,overflow:"hidden"}}>{[["account","현재 계좌"],["all","전체 계좌"]].map(([key,label])=>(<button key={key} onClick={()=>setDashView(key)} style={{padding:"6px 12px",fontSize:13,border:"none",background:dashView===key?"#185FA5":"#fff",color:dashView===key?"#fff":"#555"}}>{label}</button>))}</div><div style={{display:"flex",border:"1px solid #ddd",borderRadius:6,overflow:"hidden"}}>{[["visual","시각화"],["table","표"]].map(([key,label])=>(<button key={key} onClick={()=>setDisplayMode(key)} style={{padding:"6px 12px",fontSize:13,border:"none",background:displayMode===key?"#185FA5":"#fff",color:displayMode===key?"#fff":"#555"}}>{label}</button>))}</div></div><div style={{display:"flex",alignItems:"center",gap:8}}>{lastUpdated&&<span style={{fontSize:12,color:"#888"}}>{lastUpdated}</span>}<button style={{...C.btn,padding:"6px 12px",fontSize:12,border:"1px solid #185FA5",color:"#185FA5"}} onClick={()=>loadPricesFromDB(session.access_token)} disabled={pricesLoading}>{pricesLoading?"조회 중...":"DB 시세 불러오기"}</button></div></div><div style={{display:"flex",gap:16,flexWrap:"wrap"}}><div style={{display:"flex",alignItems:"center",gap:6}}><span style={{fontSize:13,color:"#555"}}>필터:</span><select style={{...C.input,padding:"4px 8px",width:"auto",fontSize:13}} value={filterStatus} onChange={e=>setFilterStatus(e.target.value)}><option value="all">전체보기</option><option value="조기상환 가능">조기상환 가능</option><option value="순연 예상">순연 예상</option><option value="낙인터치 상환가능">낙인터치 상환가능</option><option value="낙인터치 손실위험">낙인터치 손실위험</option></select></div><div style={{display:"flex",alignItems:"center",gap:6}}><span style={{fontSize:13,color:"#555"}}>정렬:</span><select style={{...C.input,padding:"4px 8px",width:"auto",fontSize:13}} value={sortBy} onChange={e=>setSortBy(e.target.value)}><option value="name">이름순</option><option value="date">오는 평가일순</option><option value="status">상환평가상태순</option></select></div></div></div>
              <div style={{marginBottom:16}}>{dashView==="account" ? (<div style={{display:"flex",gap:10}}><div style={{...C.metricCard, background:"#fff", border:"1px solid #e5e5e5"}}><div style={{fontSize:12,color:"#888"}}>{acc.name} 총 잔액</div><div style={{fontSize:20,fontWeight:500}}>{currentAccMetrics.total.toLocaleString()}만</div></div><div style={{...C.metricCard, background:"#fff", border:"1px solid #e5e5e5"}}><div style={{fontSize:12,color:"#888"}}>평균 수익률</div><div style={{fontSize:20,fontWeight:500}}>{currentAccMetrics.rate.toFixed(1)}%</div></div></div>) : (<div style={{display:"flex", flexDirection:"column", gap:10}}><div style={{display:"flex",gap:10}}><div style={{...C.metricCard, background:"#E1F5EE", border:"1px solid #c3e6cb"}}><div style={{fontSize:12,color:"#0F6E56", fontWeight:500}}>전체 계좌 총 잔액</div><div style={{fontSize:20,fontWeight:700,color:"#0F6E56"}}>{grandTotal.toLocaleString()}만</div></div><div style={{...C.metricCard, background:"#E1F5EE", border:"1px solid #c3e6cb"}}><div style={{fontSize:12,color:"#0F6E56", fontWeight:500}}>전체 평균 수익률</div><div style={{fontSize:20,fontWeight:700,color:"#0F6E56"}}>{grandRate.toFixed(1)}%</div></div></div>{accounts.length>1&&(<div style={{display:"flex",gap:10,overflowX:"auto",paddingBottom:4}}>{allAccsMetrics.map(m=>(<div key={m.name} style={{...C.metricCard,minWidth:140,background:"#fff",border:"1px solid #e5e5e5",padding:"10px 14px"}}><div style={{fontSize:13,fontWeight:500,marginBottom:4}}>{m.name}</div><div style={{fontSize:13,color:"#555"}}>{m.total.toLocaleString()}만 <span style={{color:"#bbb",margin:"0 4px"}}>|</span> {m.rate.toFixed(1)}%</div></div>))}</div>)}</div>)}</div>
              {filteredDashProducts.length===0 && <div style={{...C.card,textAlign:"center",color:"#aaa",padding:40}}>해당 조건에 맞는 상품이 없습니다.</div>}
              {displayMode === "visual" && filteredDashProducts.map(({p, st}) => (
                <div key={p.id} style={C.card}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
                    <div><span style={{fontSize:15,fontWeight:500}}>{getShortName(p.name)}</span>{dashView==="all" && (<span style={{display:"inline-flex",gap:4,marginLeft:8,verticalAlign:"middle"}}>{accounts.filter(a=>(a.products[p.id]||0)>0).map(a=>(<span key={a.id} style={{fontSize:10,padding:"2px 6px",background:"#E2E8F0",color:"#475569",borderRadius:4}}>{a.name}</span>))}</span>)}<div style={{marginTop:4}}>{st.next&&<span style={{fontSize:12,color:"#888"}}>D-{st.next.days} ({fmt(st.next.date)})</span>}</div></div>
                    <span style={{display:"inline-block",padding:"3px 10px",borderRadius:6,fontSize:12,fontWeight:500,background:st.sBg,color:st.sColor}}>{st.sText}</span>
                  </div>
                  {st.assetStatuses.map(as=>(<div key={as.asset} style={{marginBottom:10}}><div style={{display:"flex",justifyContent:"space-between",fontSize:13}}><span>{as.asset}</span><span style={{color:"#666"}}>기준가: {as.init ? as.init.toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2}) : "—"}</span></div><RatioBar ratio={as.ratio} init={as.init} cur={as.cur} barrier={as.barrier} knockIn={p.knockIn}/></div>))}
                </div>
              ))}
              {displayMode === "table" && filteredDashProducts.length > 0 && (
                <div style={{background:"#fff", border:"0.5px solid #e5e5e5", borderRadius:8, overflowX:"auto", marginBottom:12}}>
                  <table className="data-table" style={{width:"100%", borderCollapse:"collapse", fontSize:13}}>
                    <thead><tr><th>상품명</th><th>다음 평가일</th><th>기초자산 (현재가/비율)</th><th>배리어/낙인 기준가</th><th>평가 상태</th></tr></thead>
                    <tbody>
                      {filteredDashProducts.map(({p, st}) => (
                        <tr key={p.id}>
                          <td style={{fontWeight:500}}>{getShortName(p.name)}{dashView==="all"&&(<div style={{display:"flex",flexWrap:"wrap",gap:4,marginTop:6}}>{accounts.filter(a=>(a.products[p.id]||0)>0).map(a=>(<span key={a.id} style={{fontSize:10,padding:"2px 5px",background:"#E2E8F0",color:"#475569",borderRadius:4}}>{a.name}</span>))}</div>)}</td>
                          <td>{st.next ? <span style={{color:st.next.days<=14?"#BA7517":undefined}}>{fmt(st.next.date)}<br/><small>D-{st.next.days}</small></span> : "—"}</td>
                          <td>{st.assetStatuses.map(as => (<div key={as.asset} style={{marginBottom:6}}><div>{as.asset}</div><div style={{fontWeight:500, color:as.ratio&&as.ratio>=st.barrier?"#0F6E56":"#DC2626"}}>{as.cur?as.cur.toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2}):"—"}<span style={{fontSize:11,marginLeft:4}}>({as.ratio?`${as.ratio.toFixed(1)}%`:"—"})</span></div></div>))}</td>
                          <td><div style={{marginBottom:6,fontWeight:500}}>{st.barrier}% / {p.knockIn}%</div>{st.assetStatuses.map(as => {const bP=as.init?(as.init*st.barrier/100).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2}):"—"; const kP=as.init?(as.init*p.knockIn/100).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2}):"—"; return (<div key={as.asset} style={{fontSize:11,color:'#888',marginBottom:2}}>{as.asset}: {bP} / {kP}</div>);})}</td>
                          <td><span style={{display:"inline-block",padding:"3px 8px",borderRadius:4,fontSize:11,fontWeight:500,background:st.sBg,color:st.sColor}}>{st.sText}</span></td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              )}
            </>)}
          </div>

          {addModal&&(
            <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.45)",display:"flex",alignItems:"flex-end",zIndex:100}}>
              <div style={{background:"#fff",width:"100%",maxHeight:"85vh",overflowY:"auto",borderRadius:"16px 16px 0 0",padding:20}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}><span style={{fontSize:16,fontWeight:500}}>상품 추가</span><button style={C.btn} onClick={()=>setAddModal(null)}>닫기</button></div>
                <div style={{display:"flex",gap:8,marginBottom:16}}><button style={{...C.btn,background:addModal==="list"?"#B5D4F4":undefined}} onClick={()=>openAddModal("list")}>전체 목록</button><button style={{...C.btn,background:addModal==="text"?"#B5D4F4":undefined}} onClick={()=>openAddModal("text")}>텍스트 검색</button></div>
                {addModal==="text"&&(<div style={{marginBottom:12}}><textarea style={{...C.input,height:80}} placeholder="상품명 또는 회차 입력" value={textInput} onChange={e=>setTextInput(e.target.value)}/><button style={{...C.btnP,marginTop:8}} onClick={handleTextMatch}>검색</button></div>)}
                {(addModal==="list"||textMatched!==null)&&(()=>{ const list=addModal==="list"?db.filter(p=>!myProductIds.includes(String(p.id))):textMatched; const allC=list.length>0&&list.every(p=>checkedAdd[p.id]); return(<>
                  {list.length>0&&<div style={{display:"flex",justifyContent:"flex-end",marginBottom:8}}><button style={{...C.btn,fontSize:12,padding:"4px 10px"}} onClick={()=>{const n={};list.forEach(p=>n[p.id]=!allC);setCheckedAdd(p=>({...p,...n}));}}>{allC?"전체 해제":"전체 선택"}</button></div>}
                  {list.map(p=>(<div key={p.id} onClick={()=>setCheckedAdd(v=>({...v,[p.id]:!v[p.id]}))} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 0",borderBottom:"0.5px solid #eee",cursor:"pointer"}}><input type="checkbox" checked={!!checkedAdd[p.id]} onChange={()=>{}} style={{width:16,height:16,pointerEvents:"none"}}/><div style={{flex:1}}><div style={{fontSize:14,fontWeight:500}}>{p.name}</div><div style={{fontSize:12,color:"#666"}}>{p.assets.join(" / ")} | 연 {p.annualRate}%</div></div></div>))}
                  <button style={{...C.btnP,width:"100%",marginTop:16}} onClick={confirmAdd}>확인</button></>); })()}
              </div>
            </div>
          )}

          {detailProduct&&(
            <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.45)",display:"flex",alignItems:"flex-end",zIndex:100}}>
              <div style={{background:"#fff",width:"100%",maxHeight:"85vh",overflowY:"auto",borderRadius:"16px 16px 0 0",padding:20}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}><span style={{fontSize:16,fontWeight:500}}>{getShortName(detailProduct.name)}</span><button style={C.btn} onClick={()=>setDetailProduct(null)}>닫기</button></div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:16}}>{[["기초자산",detailProduct.assets.join(", ")],["연 수익률",detailProduct.annualRate+"%"],["낙인배리어",detailProduct.knockIn+"%"],["만기",detailProduct.maturityMonths+"개월"],["발행일",fmt(detailProduct.issue_date)],["만기일",fmt(detailProduct.maturity_date)]].map(([k,v])=>(<div key={k} style={{background:"#f5f7fa",borderRadius:8,padding:"10px 12px"}}><div style={{fontSize:12,color:"#666"}}>{k}</div><div style={{fontSize:14,fontWeight:500,marginTop:2}}>{v}</div></div>))}</div>
                <div style={{fontSize:13,fontWeight:500,marginBottom:8}}>차수별 조기상환 배리어</div>
                {detailProduct.evaluationDates.map(([evalD,payD],idx)=>{ const d=daysUntil(evalD); const bar=detailProduct.earlyBarriers[idx]??detailProduct.earlyBarriers[detailProduct.earlyBarriers.length-1]; const isP=d<0; return(<div key={idx} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:"0.5px solid #eee",opacity:isP?0.4:1}}><div><span style={{fontSize:13}}>{idx+1}차 {fmt(evalD)}</span><span style={{fontSize:12,color:"#888",marginLeft:8}}>지급 {fmt(payD)}</span></div><div style={{display:"flex",alignItems:"center",gap:8}}><span style={{fontSize:13,color:"#185FA5"}}>{bar}%</span>{!isP&&d<=14&&<span style={{fontSize:11,padding:"2px 8px",borderRadius:6,background:"#FAEEDA",color:"#BA7517",fontWeight:500}}>D-{d}</span>}</div></div>);})}
              </div>
            </div>
          )}
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
