    function formatExcelDate(d){
      if(!d) return null;
      if(d instanceof Date) {
        const y=d.getFullYear(), m=String(d.getMonth()+1).padStart(2,'0'), day=String(d.getDate()).padStart(2,'0');
        return `${y}-${m}-${day}`;
      }
      const s = String(d).trim();
      if(s.length >= 10) return s.slice(0,10);
      return null;
    }

    function parseNum(val) {
      if(typeof val === 'number') return val;
      if(!val) return 0;
      const str = String(val).replace(/[^0-9.-]/g, '');
      const n = parseFloat(str);
      return isNaN(n) ? 0 : n;
    }

    const NORMALIZE_MAP = {
      "마이크론 테크놀로지": "마이크론", "팔란티어 테크": "팔란티어", "인텔 코퍼레이션": "인텔", "NVIDIA": "엔비디아",
      "S&P 500": "S&P500", "나스닥 100": "NASDAQ100", "나스닥100": "NASDAQ100",
      "EURO STOXX 50": "유로스톡스50", "EUROSTOXX50": "유로스톡스50",
      "코스피 200": "KOSPI200", "코스피200": "KOSPI200", "홍콩H지수": "HSCEI", "홍콩 H지수": "HSCEI",
      "닛케이225": "니케이225", "NIKKEI225": "니케이225", "NIKKEI 225": "니케이225"
    };

    function parseElsExcel(wb){
      const toJ=name=>{const s=wb.Sheets[name];return s?XLSX.utils.sheet_to_json(s,{defval:""}):[];};
      const products=toJ("Products"),underlyings=toJ("Underlyings"),schedules=toJ("Schedules");
      return products.map(p=>{
        const code=String(p.product_code);
        const assets=underlyings.filter(u=>String(u.product_code)===code);
        const assetNames=assets.map(a=>{
          const raw = String(a.asset_name).trim(); return NORMALIZE_MAP[raw] || raw;
        });
        const initialPrices={}; 
        assets.forEach(a=>{ 
          const raw = String(a.asset_name).trim(); const norm = NORMALIZE_MAP[raw] || raw;
          initialPrices[norm] = parseNum(a.initial_price); 
        });
        const sched=schedules.filter(s=>String(s.product_code)===code);
        const earlyRows=sched.filter(s=>String(s.period)!=="만기");
        const evaluationDates=earlyRows.map(s=>[formatExcelDate(s.eval_date)||" ",formatExcelDate(s.payment_date)||" "]);
        let earlyBarriers = earlyRows.map(s => parseNum(s.barrier_pct)).filter(n => n > 0);
        if(earlyBarriers.length === 0) earlyBarriers = (String(p.barriers||"")).split(/[-,]/).map(parseNum).filter(n=>n>0);
        let maturityMonths=36;
        const tm=String(p.term||""),my=tm.match(/(\d+)\s*년/),mm=tm.match(/(\d+)\s*개월/);
        if(my)maturityMonths=parseInt(my[1])*12; if(mm)maturityMonths+=(my?parseInt(mm[1]):parseInt(mm[1]));
        let redemptionCycle=6;
        if(tm.includes("4개월"))redemptionCycle=4; else if(tm.includes("3개월"))redemptionCycle=3;
        const isLizard=!!(p.special_note&&String(p.special_note).includes("리자드"));
        return{
          id:code, name:String(p.full_name||code), assets:assetNames, annualRate:parseNum(p.max_annual_yield), 
          maturityMonths, redemptionCycle, earlyBarriers, knockIn:parseNum(p.ki_level)||30, 
          issueDate:formatExcelDate(p.issue_date), maturityDate:formatExcelDate(p.maturity_date), 
          initialPrices, evaluationDates, isLizard, _underlyings:assets, _schedules:sched
        };
      });
    }

    const TICKER_MAP = {
      "마이크론":"MU", "팔란티어":"PLTR", "테슬라":"TSLA", "인텔":"INTC", "엔비디아":"NVDA", "브로드컴":"AVGO", "애플":"AAPL", "AMD":"AMD",
      "S&P500":"^GSPC", "NASDAQ100":"^NDX", "유로스톡스50":"^STOXX50E", "KOSPI200":"^KS200", "HSCEI":"^HSCE", "니케이225":"^N225"
    };

    const TODAY=new Date("2026-04-17");
    function fmt(s){if(!s||s.trim()==="")return"";const d=new Date(s);if(isNaN(d))return s;return`${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`;}
    function daysUntil(s){if(!s||s.trim()==="")return 9999;return Math.ceil((new Date(s)-TODAY)/86400000);}
    function getNextEval(p){for(const[e]of(p.evaluationDates||[])){const d=daysUntil(e);if(d>=0&&d!==9999)return{date:e,days:d};}return null;}

    function RatioBar({ratio, init, cur, barrier, knockIn}){
      if(!init || init <= 0) return <div style={{fontSize:12,color:"#A32D2D",padding:"8px 0",fontWeight:500}}>⚠️ 기준가 미입력</div>;
      if(cur === null || cur === undefined) return <div style={{fontSize:12,color:"#aaa",padding:"8px 0"}}>종가 데이터 대기 중</div>;
      const MIN=0, MAX=150, pct=v=>Math.max(0,Math.min(100,(v-MIN)/(MAX-MIN)*100));
      const kiPct=pct(knockIn), barPct=pct(barrier), curPct=pct(ratio);
      const curColor=ratio<knockIn?"#A32D2D":ratio<barrier?"#BA7517":"#0F6E56";
      const labels=[{id:"ki",pct:kiPct},{id:"bar",pct:barPct},{id:"cur",pct:curPct}].sort((a,b)=>a.pct-b.pct);
      for(let i=1;i<labels.length;i++)if(labels[i].pct-labels[i-1].pct<8)labels[i].pct=labels[i-1].pct+8;
      const lm={};labels.forEach(l=>lm[l.id]=l.pct);
      return(
        <div style={{padding:"8px 0 4px"}}>
          <div style={{position:"relative",height:8,background:"#e8e8e8",borderRadius:4,margin:"0 0 22px"}}>
            <div style={{position:"absolute",left:0,top:0,bottom:0,width:`${kiPct}%`,background:"rgba(162,45,45,0.12)",borderRadius:"4px 0 0 4px"}}/>
            <div style={{position:"absolute",left:`${kiPct}%`,top:0,bottom:0,width:`${barPct-kiPct}%`,background:"rgba(186,117,23,0.10)"}}/>
            <div style={{position:"absolute",left:`${barPct}%`,top:0,bottom:0,right:0,background:"rgba(15,110,86,0.10)",borderRadius:"0 4px 4px 0"}}/>
            <div style={{position:"absolute",left:`${kiPct}%`,top:-4,bottom:-4,width:2,background:"#A32D2D",transform:"translateX(-50%)",zIndex:2}}/>
            <div style={{position:"absolute",left:`${barPct}%`,top:-4,bottom:-4,width:2,background:"#BA7517",transform:"translateX(-50%)",zIndex:2}}/>
            <div style={{position:"absolute",left:`${curPct}%`,top:"50%",transform:"translate(-50%,-50%)",width:13,height:13,background:curColor,borderRadius:"50%",border:"2px solid #fff",zIndex:3,outline:`2px solid ${curColor}`}}/>
            <div style={{position:"absolute",left:`${lm.ki}%`,top:12,transform:"translateX(-50%)",fontSize:11,color:"#A32D2D",whiteSpace:"nowrap",fontWeight:500}}>{knockIn}%</div>
            <div style={{position:"absolute",left:`${lm.bar}%`,top:12,transform:"translateX(-50%)",fontSize:11,color:"#BA7517",whiteSpace:"nowrap",fontWeight:500}}>{barrier}%</div>
            <div style={{position:"absolute",left:`${lm.cur}%`,top:12,transform:"translateX(-50%)",fontSize:11,color:curColor,whiteSpace:"nowrap",fontWeight:700}}>{ratio.toFixed(1)}%</div>
          </div>
        </div>
      );
    }

      // ★ [중요 수정] 계좌를 불러올 때 '현재 로그인한 유저의 ID'에 해당하는 계좌만 불러오기

      async function handleXlsxUpload(e){
        const file=e.target.files[0];if(!file)return;
        setXlsxLoading(true);setXlsxStatus(null);
        try{

          if(parsed.length===0){setXlsxStatus({ok:false,msg:"데이터 없음"});setXlsxLoading(false);return;}
          const token=session.access_token; const h={...sbH(token),"Prefer":"return=minimal"};
          async function dbFetch(url, method, body) { const res = await fetch(url, { method, headers: h, body: body ? JSON.stringify(body) : undefined }); if (!res.ok) throw new Error("에러"); }
          await dbFetch(`${SB_URL}/rest/v1/schedules?id=gt.0`, "DELETE"); await dbFetch(`${SB_URL}/rest/v1/underlyings?id=gt.0`, "DELETE"); await dbFetch(`${SB_URL}/rest/v1/products?id=neq.NONE`, "DELETE");
          const prodRows=parsed.map(p=>({id:p.id,name:p.name,annual_rate:p.annualRate,maturity_months:p.maturityMonths,redemption_cycle:p.redemptionCycle,early_barriers:p.earlyBarriers,knock_in:p.knockIn,issue_date:p.issueDate,maturity_date:p.maturityDate,is_lizard:p.isLizard}));

          if(underRows.length>0) await dbFetch(`${SB_URL}/rest/v1/underlyings`, "POST", underRows);

          if(schedRows.length>0) await dbFetch(`${SB_URL}/rest/v1/schedules`, "POST", schedRows);

      const myProductIds=Object.keys(acc.products||{}).map(String); const myProducts=db.filter(p=>myProductIds.includes(String(p.id)));
      const totalAmt=myProducts.reduce((s,p)=>s+(acc.products[p.id]||0),0); const weightedRate=totalAmt>0?myProducts.reduce((s,p)=>s+(acc.products[p.id]||0)*p.annualRate,0)/totalAmt:0;
      const upcomingEvals=myProducts.map(p=>{const n=getNextEval(p);return n&&n.days<=14?{product:p,...n}:null;}).filter(Boolean).sort((a,b)=>a.days-b.days);
      const allProductIds=[...new Set(accounts.flatMap(a=>Object.keys(a.products||{}).map(String)))];

      function getInitPrice(pid,asset){const o=initPrices[pid]?.[asset];if(o!==undefined&&o!==0)return o;return db.find(p=>String(p.id)===String(pid))?.initialPrices[asset]??0;}
      function setInitPrice(pid,asset,val){setInitPrices(prev=>({...prev,[pid]:{...(prev[pid]||{}),[asset]:val}}));}

      async function updatePricesFromYahoo() {
        setPricesLoading(true);
        const uniqueTickers = new Set();
        const totalAssets = [...new Set(db.flatMap(p => p.assets))];
        totalAssets.forEach(asset => { if(TICKER_MAP[asset.trim()]) uniqueTickers.add(TICKER_MAP[asset.trim()]); });

        if (uniqueTickers.size > 0) {
          // ★ 여기에 본인의 구글 스크립트 웹 앱 주소를 꼭 입력하세요 ★
          const GAS_URL = "https://script.google.com/macros/s/AKfycbwh9Lh5RP3VCMfQIu_zouK0_QgGtngRbE6VUXzL002xdhdRrc1YEg861uyfGB5ctNH1/exec";
          try {
            const res = await fetch(`${GAS_URL}?symbols=${Array.from(uniqueTickers).join(',')}`);
            if (res.ok) {
              const data = await res.json();
              if (data?.quoteResponse?.result) alert("✓ 수동 수집 성공. 이제 DB 시세를 불러오세요.");
            }
          } catch(e) { alert("업데이트 실패"); }
        }
        setPricesLoading(false);
      }

      function calcStatus(p){
        const next=getNextEval(p); const idx=next?p.evaluationDates.findIndex(([e])=>e===next.date):p.evaluationDates.length-1;
        const barrier=p.earlyBarriers[idx]??p.earlyBarriers[p.earlyBarriers.length-1];
        
        const assetStatuses=p.assets.map(asset=>{
          const cur=prices[asset]||null; const init=getInitPrice(p.id,asset);
          const ratio=(cur&&init>0)?(cur/init)*100:null;
          return{asset,cur,init,ratio,canRedeem:ratio!==null?ratio>=barrier:null,barrier};
        });

        const canRedeem = assetStatuses.every(a=>a.canRedeem===true);
        const isKnockedIn = p.is_ki_hit || assetStatuses.some(a=>a.ratio !== null && a.ratio < p.knockIn);

        let sText = "시세 대기", sBg = "#f9f9f9", sColor = "#aaa";
        const hasPriceData = assetStatuses.every(a => a.ratio !== null);

        if (hasPriceData) {
          if (!isKnockedIn && canRedeem)      { sText = "조기상환 가능";    sBg = "#E1F5EE"; sColor = "#0F6E56"; }
          else if (!isKnockedIn && !canRedeem){ sText = "순연 예상";        sBg = "#FFF4E5"; sColor = "#D97706"; }
          else if (isKnockedIn && canRedeem)  { sText = "낙인터치 상환가능"; sBg = "#F3E8FF"; sColor = "#7E22CE"; }
          else if (isKnockedIn && !canRedeem) { sText = "낙인터치 손실위험"; sBg = "#FEE2E2"; sColor = "#DC2626"; }
        }

        return{assetStatuses, isKnockedIn, canRedeem, barrier, next, sText, sBg, sColor};
      }

      const processedDashProducts = rawDashProducts.map(p => ({ p, st: calcStatus(p) }));

        }
        return 0;

                      <option value="all">전체보기</option>
                      <option value="조기상환 가능">조기상환 가능</option>
                      <option value="순연 예상">순연 예상</option>
                      <option value="낙인터치 상환가능">낙인터치 상환가능</option>
                      <option value="낙인터치 손실위험">낙인터치 손실위험</option>
                    </select>
                  </div>
                  <div style={{display:"flex",alignItems:"center",gap:6}}>
                    <span style={{fontSize:13,color:"#555"}}>정렬:</span>
                    <select style={{...C.input,padding:"4px 8px",width:"auto",fontSize:13}} value={sortBy} onChange={e=>setSortBy(e.target.value)}>
                      <option value="name">이름순</option>
                      <option value="date">오는 평가일순</option>
                      <option value="status">상환평가상태순</option>
                    </select>
                  </div>
                </div>
              </div>

              {filteredDashProducts.length === 0 && <div style={{...C.card,textAlign:"center",color:"#aaa",padding:40}}>해당 조건에 맞는 상품이 없습니다.</div>}

              {displayMode === "visual" && filteredDashProducts.map(({p, st}) => (
                <div key={p.id} style={C.card}>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:10}}>
                    <div>
                      <span style={{fontSize:15,fontWeight:500}}>{p.name}</span>
                      {st.next&&<span style={{fontSize:12,color:"#888",marginLeft:8}}>D-{st.next.days} ({fmt(st.next.date)})</span>}
                    </div>
                    <span style={{display:"inline-block",padding:"3px 10px",borderRadius:6,fontSize:12,fontWeight:500,background:st.sBg,color:st.sColor}}>{st.sText}</span>
                  </div>
                  {st.assetStatuses.map(as=>(<div key={as.asset} style={{marginBottom:10}}>
                    <div style={{display:"flex",justifyContent:"space-between",fontSize:13}}>
                      <span>{as.asset}</span>
                      <span>{as.cur?`$${as.cur}`:"—"} ({as.ratio?as.ratio.toFixed(1):"—"}%)</span>
                    </div>
                    <RatioBar ratio={as.ratio} init={as.init} cur={as.cur} barrier={as.barrier} knockIn={p.knockIn}/>
                  </div>))}
                </div>
              ))}

              {displayMode === "table" && filteredDashProducts.length > 0 && (
                <div style={{background:"#fff", border:"0.5px solid #e5e5e5", borderRadius:8, overflowX:"auto", marginBottom:12}}>
                  <table className="data-table" style={{width:"100%", borderCollapse:"collapse", fontSize:13}}>
                    <thead>
                      <tr>
                        <th>상품명</th>
                        <th>다음 평가일</th>
                        <th>기초자산 (현재비율)</th>
                        <th>배리어/낙인</th>
                        <th>평가 상태</th>
                      </tr>
                    </thead>
                    <tbody>
                      {filteredDashProducts.map(({p, st}) => (
                        <tr key={p.id}>
                          <td style={{fontWeight:500}}>{p.name}</td>
                          <td>{st.next ? <span style={{color:st.next.days<=14?"#BA7517":undefined}}>{fmt(st.next.date)}<br/><small>D-{st.next.days}</small></span> : "—"}</td>
                          <td>
                            {st.assetStatuses.map(as => (
                              <div key={as.asset} style={{marginBottom:4}}>
                                {as.asset}: <span style={{fontWeight:500, color:as.ratio&&as.ratio>=st.barrier?"#0F6E56":"#A32D2D"}}>{as.ratio?`${as.ratio.toFixed(1)}%`:"—"}</span>
                              </div>
                            ))}
                          </td>
                          <td>{st.barrier}% / {p.knockIn}%</td>
                          <td><span style={{display:"inline-block",padding:"3px 8px",borderRadius:4,fontSize:11,fontWeight:500,background:st.sBg,color:st.sColor,whiteSpace:"nowrap"}}>{st.sText}</span></td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              )}
            </>)}
          </div>

          {addModal&&(
            <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.45)",display:"flex",alignItems:"flex-end",zIndex:100}}>
              <div style={{background:"#fff",width:"100%",maxHeight:"85vh",overflowY:"auto",borderRadius:"16px 16px 0 0",padding:20}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
                  <span style={{fontSize:16,fontWeight:500}}>상품 추가</span>
                  <button style={C.btn} onClick={()=>setAddModal(null)}>닫기</button>
                </div>
                <div style={{display:"flex",gap:8,marginBottom:16}}>
                  <button style={{...C.btn,background:addModal==="list"?"#B5D4F4":undefined}} onClick={()=>openAddModal("list")}>전체 목록</button>
                  <button style={{...C.btn,background:addModal==="text"?"#B5D4F4":undefined}} onClick={()=>openAddModal("text")}>텍스트 검색</button>
                </div>
                {addModal==="text"&&(<div style={{marginBottom:12}}><textarea style={{...C.input,height:80,resize:"vertical"}} placeholder="상품명 또는 회차 번호 입력" value={textInput} onChange={e=>setTextInput(e.target.value)}/><button style={{...C.btnP,marginTop:8}} onClick={handleTextMatch}>검색</button></div>)}
                {(addModal==="list"||((addModal==="text")&&textMatched!==null))&&(()=>{
                  const list=addModal==="list"?db.filter(p=>!myProductIds.includes(String(p.id))):textMatched;
                  const allChecked=list.length>0&&list.every(p=>checkedAdd[p.id]);
                  return(<>
                    {list.length>0&&<div style={{display:"flex",justifyContent:"flex-end",marginBottom:8}}><button style={{...C.btn,fontSize:12,padding:"4px 10px"}} onClick={()=>{const next={};list.forEach(p=>next[p.id]=!allChecked);setCheckedAdd(prev=>({...prev,...next}));}}>{allChecked?"전체 해제":"전체 선택"}</button></div>}
                    
                    {list.map(p=>(
                      <div key={p.id} onClick={()=>setCheckedAdd(prev=>({...prev,[p.id]:!prev[p.id]}))} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 0",borderBottom:"0.5px solid #eee",cursor:"pointer"}}>
                        <input type="checkbox" checked={!!checkedAdd[p.id]} onChange={()=>{}} style={{width:16,height:16,pointerEvents:"none"}}/>
                        <div style={{flex:1}}>
                          <div style={{fontSize:14,fontWeight:500}}>{p.name}</div>
                          <div style={{fontSize:12,color:"#666"}}>{p.assets.join(" / ")} | 연 {p.annualRate}% | KI {p.knockIn}%</div>
                        </div>
                      </div>
                    ))}
                    {list.length===0&&<div style={{textAlign:"center",color:"#aaa",padding:20}}>추가할 수 있는 상품이 없습니다.</div>}
                    <button style={{...C.btnP,width:"100%",marginTop:16}} onClick={confirmAdd}>확인</button>
                  </>);
                })()}
              </div>
            </div>
          )}

          {detailProduct&&(
            <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.45)",display:"flex",alignItems:"flex-end",zIndex:100}}>
              <div style={{background:"#fff",width:"100%",maxHeight:"85vh",overflowY:"auto",borderRadius:"16px 16px 0 0",padding:20}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
                  <span style={{fontSize:16,fontWeight:500}}>{detailProduct.name}</span>
                  <button style={C.btn} onClick={()=>setDetailProduct(null)}>닫기</button>
                </div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:16}}>
                  {[["기초자산",detailProduct.assets.join(", ")],["연 수익률",detailProduct.annualRate+"%"],["낙인배리어",detailProduct.knockIn+"%"],["만기",detailProduct.maturityMonths+"개월"],["발행일",fmt(detailProduct.issue_date)],["만기일",fmt(detailProduct.maturity_date)]].map(([k,v])=>(
                    <div key={k} style={{background:"#f5f7fa",borderRadius:8,padding:"10px 12px"}}><div style={{fontSize:12,color:"#666"}}>{k}</div><div style={{fontSize:14,fontWeight:500,marginTop:2}}>{v}</div></div>
                  ))}
                </div>
                <div style={{fontSize:13,fontWeight:500,marginBottom:8}}>차수별 조기상환 배리어</div>
                {detailProduct.evaluationDates.map(([evalD,payD],idx)=>{
                  const days=daysUntil(evalD);const barrier=detailProduct.earlyBarriers[idx]??detailProduct.earlyBarriers[detailProduct.earlyBarriers.length-1];const isPast=days<0;
                  return(<div key={idx} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:"0.5px solid #eee",opacity:isPast?0.4:1}}><div><span style={{fontSize:13}}>{idx+1}차 {fmt(evalD)}</span><span style={{fontSize:12,color:"#888",marginLeft:8}}>지급 {fmt(payD)}</span></div><div style={{display:"flex",alignItems:"center",gap:8}}><span style={{fontSize:13,color:"#185FA5"}}>{barrier}%</span>{!isPast&&days<=14&&<span style={{fontSize:11,padding:"2px 8px",borderRadius:6,background:"#FAEEDA",color:"#BA7517",fontWeight:500}}>D-{days}</span>}</div></div>);
                })}
              </div>
            </div>
          )}
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
